name: "aws_deploy_cicd"

on:
  pull_request:
    branches:
      - production
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        default: "apply"
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  TF_VERSION:       "1.7.5"
  AWS_REGION:       "us-east-1"
  WORKING_DIR:      "./terraform"
  TF_STATE_BUCKET:  "event-ticketing-terraform-state"
  TF_LOCK_TABLE:    "event-ticketing-terraform-lock"

jobs:
  # ═════════════════════════════════════════════════════════════════════════════
  # JOB 1/3 — TERRAFORM PLAN
  # ═════════════════════════════════════════════════════════════════════════════
  terraform-plan:
    name: "1/3 Plan"
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.action == 'plan' || github.event.inputs.action == 'apply'))
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    permissions:
      contents: read
      pull-requests: write

    outputs:
      plan_status: ${{ steps.plan.outcome }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Ensure S3 + DynamoDB backend
        run: |
          aws s3api head-bucket --bucket "${{ env.TF_STATE_BUCKET }}" 2>/dev/null ||
            aws s3 mb "s3://${{ env.TF_STATE_BUCKET }}" --region "${{ env.AWS_REGION }}"
          aws s3api put-bucket-versioning \
            --bucket "${{ env.TF_STATE_BUCKET }}" \
            --versioning-configuration Status=Enabled
          aws dynamodb describe-table --table-name "${{ env.TF_LOCK_TABLE }}" 2>/dev/null ||
            aws dynamodb create-table \
              --table-name "${{ env.TF_LOCK_TABLE }}" \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --billing-mode PAY_PER_REQUEST

      - name: Terraform Init
        run: terraform init -input=false

      - name: Import existing resources (if state empty)
        run: |
          set +e
          if ! terraform state list 2>/dev/null | grep -q .; then
            echo "State empty — importing existing resources..."
            for id in $(aws ec2 describe-instances \
              --filters "Name=tag:Project,Values=event-ticketing" "Name=instance-state-name,Values=running" \
              --query "Reservations[].Instances[].InstanceId" --output text); do
              NAME=$(aws ec2 describe-tags --filters "Name=resource-id,Values=$id" "Name=key,Values=Name" --query "Tags[0].Value" --output text)
              case "$NAME" in *app*)     terraform import aws_instance.app "$id" 2>/dev/null ;; *mongodb*) terraform import aws_instance.mongodb "$id" 2>/dev/null ;; esac
            done
            for sg in $(aws ec2 describe-security-groups \
              --filters "Name=tag:Project,Values=event-ticketing" \
              --query "SecurityGroups[].GroupId" --output text); do
              NAME=$(aws ec2 describe-security-groups --group-ids "$sg" --query "SecurityGroups[0].GroupName" --output text)
              case "$NAME" in *app-sg*)     terraform import aws_security_group.app_sg "$sg" 2>/dev/null ;; *mongodb-sg*) terraform import aws_security_group.mongodb_sg "$sg" 2>/dev/null ;; esac
            done
          else
            echo "State has entries — skipping import."
          fi
          set -e

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -no-color \
            -var="key_pair_name=${{ secrets.AWS_KEY_PAIR_NAME }}" \
            -var="project_name=event-ticketing" \
            -var="environment=production" \
            -var="mongo_username=appuser" \
            -var="mongo_password=${{ secrets.MONGO_PASSWORD }}" \
            -var="mongo_database=event_ticketing" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="github_repo=https://github.com/irasiii/event-ticket_2.git" \
            -out=tfplan 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.WORKING_DIR }}/tfplan
          retention-days: 5

      - name: Plan output to step summary
        run: |
          {
            echo "## :clipboard: Terraform Plan"
            echo ""
            echo "**Status:** ${{ steps.plan.outcome }}"
            echo ""
            echo "<details><summary>Show Plan</summary>"
            echo ""
            echo '```hcl'
            head -c 50000 plan_output.txt
            echo '```'
            echo "</details>"
          } >> $GITHUB_STEP_SUMMARY

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.WORKING_DIR }}/plan_output.txt', 'utf8');
            const maxLen = 60000;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## :clipboard: Terraform Plan',
                '**Triggered by:** @' + context.actor,
                '**Changes:** ' + (plan.includes('will be created') || plan.includes('will be destroyed') || plan.includes('will be changed') ? 'Yes' : 'None'),
                '',
                '<details><summary>Show Plan</summary>',
                '',
                '```hcl',
                plan.length > maxLen ? plan.substring(0, maxLen) + '\n\n... (truncated)' : plan,
                '```',
                '</details>'
              ].join('\n')
            });

      - name: Fail if plan errored
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ═════════════════════════════════════════════════════════════════════════════
  # JOB 2/3 — TERRAFORM APPLY (deploy)
  # ═════════════════════════════════════════════════════════════════════════════
  terraform-apply:
    name: "2/3 Apply"
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
    environment:
      name: production
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    outputs:
      app_public_ip: ${{ steps.app_ip.outputs.app_ip }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Ensure S3 + DynamoDB backend
        run: |
          aws s3api head-bucket --bucket "${{ env.TF_STATE_BUCKET }}" 2>/dev/null ||
            aws s3 mb "s3://${{ env.TF_STATE_BUCKET }}" --region "${{ env.AWS_REGION }}"
          aws dynamodb describe-table --table-name "${{ env.TF_LOCK_TABLE }}" 2>/dev/null ||
            aws dynamodb create-table \
              --table-name "${{ env.TF_LOCK_TABLE }}" \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --billing-mode PAY_PER_REQUEST

      - name: Terraform Init
        run: terraform init -input=false

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.WORKING_DIR }}

      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve tfplan

      - name: Extract App IP
        id: app_ip
        run: |
          IP=$(terraform output -raw app_public_ip)
          echo "app_ip=$IP" >> $GITHUB_OUTPUT
          echo "App IP: $IP"

      - name: Extract MongoDB IP
        id: mongodb_ip
        run: |
          IP=$(terraform output -raw mongodb_public_ip 2>/dev/null || echo "private-only")
          echo "mongodb_ip=$IP" >> $GITHUB_OUTPUT

      - name: Deploy output
        run: |
          {
            echo "## :rocket: Infrastructure Deployed"
            echo ""
            echo "| Resource | Value |"
            echo "|---|---|"
            echo "| App URL | http://${{ steps.app_ip.outputs.app_ip }} |"
            echo "| MongoDB IP | ${{ steps.mongodb_ip.outputs.mongodb_ip }} |"
            echo "| Terraform Backend | S3 \`${{ env.TF_STATE_BUCKET }}\` + DynamoDB |"
            echo "| SSH | \`ssh -i <key>.pem ec2-user@${{ steps.app_ip.outputs.app_ip }}\` |"
            echo ""
            echo "### All Terraform Outputs"
            echo ""
            echo '```'
            terraform output -no-color
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

      - name: Update EC2_APP_HOST secret
        run: |
          APP_IP="${{ steps.app_ip.outputs.app_ip }}"
          echo "Updating EC2_APP_HOST to $APP_IP ..."
          PUBKEY_JSON=$(curl -s -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            https://api.github.com/repos/irasiii/event-ticket_2/actions/secrets/public-key)
          KEY_ID=$(echo "$PUBKEY_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['key_id'])")
          PUBKEY=$(echo "$PUBKEY_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['key'])")
          ENCRYPTED=$(python3 -c "import base64, nacl.bindings, nacl.encoding; key=base64.b64decode('$PUBKEY'); value=b'$APP_IP'; print(base64.b64encode(nacl.bindings.crypto_box_seal(value, key)).decode())")
          curl -s -X PUT \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Content-Type: application/json" \
            -d "{\"encrypted_value\": \"$ENCRYPTED\", \"key_id\": \"$KEY_ID\"}" \
            https://api.github.com/repos/irasiii/event-ticket_2/actions/secrets/EC2_APP_HOST

      - name: Dispatch redeploy
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/irasiii/event-ticket_2/actions/workflows/redeploy.yml/dispatches \
            -d '{"ref":"production"}'
          echo "Redeploy dispatched on production."

  # ═════════════════════════════════════════════════════════════════════════════
  # JOB 3/3 — TERRAFORM DESTROY
  # ═════════════════════════════════════════════════════════════════════════════
  terraform-destroy:
    name: "3/3 Destroy"
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'destroy'
    environment:
      name: production
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Ensure S3 + DynamoDB backend
        run: |
          aws s3api head-bucket --bucket "${{ env.TF_STATE_BUCKET }}" 2>/dev/null ||
            aws s3 mb "s3://${{ env.TF_STATE_BUCKET }}" --region "${{ env.AWS_REGION }}"
          aws dynamodb describe-table --table-name "${{ env.TF_LOCK_TABLE }}" 2>/dev/null ||
            aws dynamodb create-table \
              --table-name "${{ env.TF_LOCK_TABLE }}" \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --billing-mode PAY_PER_REQUEST

      - name: Terraform Init
        run: terraform init -input=false

      - name: Destroy Plan Preview
        id: destroy_plan
        run: |
          terraform plan -destroy \
            -no-color \
            -var="key_pair_name=${{ secrets.AWS_KEY_PAIR_NAME }}" \
            -var="project_name=event-ticketing" \
            -var="environment=production" \
            -var="mongo_username=appuser" \
            -var="mongo_password=${{ secrets.MONGO_PASSWORD }}" \
            -var="mongo_database=event_ticketing" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            2>&1 | tee destroy_plan.txt

      - name: Destroy Plan Summary
        run: |
          {
            echo "## :warning: Destroy Plan"
            echo ""
            echo '```'
            cat destroy_plan.txt
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

      - name: Terraform Destroy
        run: |
          terraform destroy \
            -auto-approve \
            -var="key_pair_name=${{ secrets.AWS_KEY_PAIR_NAME }}" \
            -var="project_name=event-ticketing" \
            -var="environment=production" \
            -var="mongo_username=appuser" \
            -var="mongo_password=${{ secrets.MONGO_PASSWORD }}" \
            -var="mongo_database=event_ticketing" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}"

      - name: Destroy output
        run: |
          {
            echo "## :boom: Infrastructure Destroyed"
            echo ""
            echo "| Action | Status |"
            echo "|---|---|"
            echo "| EC2 Instances | Terminated |"
            echo "| Security Groups | Deleted |"
            echo "| Terraform State | Preserved in S3 |"
            echo "| SSH Access | Revoked |"
          } >> $GITHUB_STEP_SUMMARY
