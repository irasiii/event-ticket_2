name: "AWS Infrastructure CI/CD"

on:
  pull_request:
    branches:
      - production
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        default: "apply"
        type: choice
        options:
          - apply
          - destroy

env:
  TF_VERSION:       "1.7.5"
  AWS_REGION:       "us-east-1"
  WORKING_DIR:      "./terraform"
  TF_STATE_BUCKET:  "event-ticketing-terraform-state"
  TF_LOCK_TABLE:    "event-ticketing-terraform-lock"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1 — Terraform Plan  (runs on PR and workflow_dispatch)
  # ─────────────────────────────────────────────────────────────────────────────
  terraform-plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    if: github.event.inputs.action != 'destroy'
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Ensure S3 backend bucket and DynamoDB table exist
        run: |
          aws s3api head-bucket --bucket "${{ env.TF_STATE_BUCKET }}" 2>/dev/null ||
            aws s3 mb "s3://${{ env.TF_STATE_BUCKET }}" --region "${{ env.AWS_REGION }}"
          aws s3api put-bucket-versioning \
            --bucket "${{ env.TF_STATE_BUCKET }}" \
            --versioning-configuration Status=Enabled

          aws dynamodb describe-table --table-name "${{ env.TF_LOCK_TABLE }}" 2>/dev/null ||
            aws dynamodb create-table \
              --table-name "${{ env.TF_LOCK_TABLE }}" \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --billing-mode PAY_PER_REQUEST

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init -input=false

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Import existing resources into state (first S3 backend run)
        run: |
          set +e
          # Check if state is empty — if so, try importing running resources
          if ! terraform state list 2>/dev/null | grep -q .; then
            echo "State is empty. Attempting to import existing resources..."
            INSTANCES=$(aws ec2 describe-instances \
              --filters "Name=tag:Project,Values=event-ticketing" "Name=instance-state-name,Values=running" \
              --query "Reservations[].Instances[].InstanceId" --output text)
            for id in $INSTANCES; do
              NAME=$(aws ec2 describe-tags --filters "Name=resource-id,Values=$id" "Name=key,Values=Name" --query "Tags[0].Value" --output text)
              if echo "$NAME" | grep -q "app"; then
                echo "Importing app instance $id ..."
                terraform import aws_instance.app "$id" 2>/dev/null
              elif echo "$NAME" | grep -q "mongodb"; then
                echo "Importing mongodb instance $id ..."
                terraform import aws_instance.mongodb "$id" 2>/dev/null
              fi
            done
            # Import security groups
            SGS=$(aws ec2 describe-security-groups \
              --filters "Name=tag:Project,Values=event-ticketing" \
              --query "SecurityGroups[].GroupId" --output text)
            for sg in $SGS; do
              NAME=$(aws ec2 describe-security-groups --group-ids "$sg" --query "SecurityGroups[0].GroupName" --output text)
              if echo "$NAME" | grep -q "app-sg"; then
                echo "Importing app SG $sg ..."
                terraform import aws_security_group.app_sg "$sg" 2>/dev/null
              elif echo "$NAME" | grep -q "mongodb-sg"; then
                echo "Importing mongodb SG $sg ..."
                terraform import aws_security_group.mongodb_sg "$sg" 2>/dev/null
              fi
            done
          else
            echo "State already has entries — skipping import."
          fi
          set -e

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -no-color \
            -var="key_pair_name=${{ secrets.AWS_KEY_PAIR_NAME }}" \
            -var="project_name=event-ticketing" \
            -var="environment=production" \
            -var="mongo_username=appuser" \
            -var="mongo_password=${{ secrets.MONGO_PASSWORD }}" \
            -var="mongo_database=event_ticketing" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="github_repo=https://github.com/irasiii/event-ticket_2.git" \
            -out=tfplan
        continue-on-error: true

      - name: Save human-readable plan
        run: terraform show -no-color tfplan > plan_output.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: |
            ${{ env.WORKING_DIR }}/tfplan
            ${{ env.WORKING_DIR }}/plan_output.txt
          retention-days: 5

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.WORKING_DIR }}/plan_output.txt', 'utf8');
            const maxLen = 60000;
            const body = [
              '## Terraform Plan 📋',
              '**Backend:** S3 (`event-ticketing-terraform-state`) + DynamoDB lock',
              `**Branch:** \`${ context.payload.pull_request.head.ref }\``,
              `**Triggered by:** @${ context.actor }`,
              '',
              '<details><summary>Show Plan</summary>',
              '',
              '```hcl',
              plan.length > maxLen ? plan.substring(0, maxLen) + '\n\n... (truncated)' : plan,
              '```',
              '</details>'
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail if plan errored
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2 — Terraform Apply  (workflow_dispatch with action=apply)
  # ─────────────────────────────────────────────────────────────────────────────
  terraform-apply:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
    environment:
      name: production
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Ensure S3 backend bucket and DynamoDB table exist
        run: |
          aws s3api head-bucket --bucket "${{ env.TF_STATE_BUCKET }}" 2>/dev/null ||
            aws s3 mb "s3://${{ env.TF_STATE_BUCKET }}" --region "${{ env.AWS_REGION }}"
          aws dynamodb describe-table --table-name "${{ env.TF_LOCK_TABLE }}" 2>/dev/null ||
            aws dynamodb create-table \
              --table-name "${{ env.TF_LOCK_TABLE }}" \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --billing-mode PAY_PER_REQUEST

      - name: Terraform Init
        run: terraform init -input=false

      - name: Import existing resources into state (first S3 backend run)
        run: |
          set +e
          if ! terraform state list 2>/dev/null | grep -q .; then
            echo "State is empty. Attempting to import existing resources..."
            INSTANCES=$(aws ec2 describe-instances \
              --filters "Name=tag:Project,Values=event-ticketing" "Name=instance-state-name,Values=running" \
              --query "Reservations[].Instances[].InstanceId" --output text)
            for id in $INSTANCES; do
              NAME=$(aws ec2 describe-tags --filters "Name=resource-id,Values=$id" "Name=key,Values=Name" --query "Tags[0].Value" --output text)
              if echo "$NAME" | grep -q "app"; then
                echo "Importing app instance $id ..."
                terraform import aws_instance.app "$id" 2>/dev/null
              elif echo "$NAME" | grep -q "mongodb"; then
                echo "Importing mongodb instance $id ..."
                terraform import aws_instance.mongodb "$id" 2>/dev/null
              fi
            done
            SGS=$(aws ec2 describe-security-groups \
              --filters "Name=tag:Project,Values=event-ticketing" \
              --query "SecurityGroups[].GroupId" --output text)
            for sg in $SGS; do
              NAME=$(aws ec2 describe-security-groups --group-ids "$sg" --query "SecurityGroups[0].GroupName" --output text)
              if echo "$NAME" | grep -q "app-sg"; then
                echo "Importing app SG $sg ..."
                terraform import aws_security_group.app_sg "$sg" 2>/dev/null
              elif echo "$NAME" | grep -q "mongodb-sg"; then
                echo "Importing mongodb SG $sg ..."
                terraform import aws_security_group.mongodb_sg "$sg" 2>/dev/null
              fi
            done
          else
            echo "State already has entries — skipping import."
          fi
          set -e

      - name: Download saved plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.WORKING_DIR }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Print Outputs
        run: terraform output -no-color

      - name: Write outputs to job summary
        run: |
          echo "## 🚀 Infrastructure Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          terraform output -no-color >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Extract app IP and update EC2_APP_HOST secret
        id: app_ip
        run: |
          APP_IP=$(terraform output -raw app_public_ip)
          echo "app_ip=$APP_IP" >> $GITHUB_OUTPUT
          echo "New app IP: $APP_IP"

      - name: Update EC2_APP_HOST GitHub secret with new IP
        run: |
          APP_IP="${{ steps.app_ip.outputs.app_ip }}"
          echo "Updating EC2_APP_HOST secret to $APP_IP ..."

          # Get public key
          PUBKEY_JSON=$(curl -s -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            https://api.github.com/repos/irasiii/event-ticket_2/actions/secrets/public-key)
          KEY_ID=$(echo "$PUBKEY_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['key_id'])")
          PUBKEY=$(echo "$PUBKEY_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['key'])")

          # Encrypt using libsodium
          ENCRYPTED=$(python3 -c "
import base64, json, nacl.bindings, nacl.encoding
key = base64.b64decode('$PUBKEY')
value = b'$APP_IP'
encrypted = nacl.bindings.crypto_box_seal(value, key)
print(base64.b64encode(encrypted).decode())
")

          # Update the secret
          curl -s -X PUT \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Content-Type: application/json" \
            -d "{\"encrypted_value\": \"$ENCRYPTED\", \"key_id\": \"$KEY_ID\"}" \
            https://api.github.com/repos/irasiii/event-ticket_2/actions/secrets/EC2_APP_HOST
          echo "EC2_APP_HOST updated to $APP_IP"

      - name: Dispatch redeploy workflow
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/irasiii/event-ticket_2/actions/workflows/redeploy.yml/dispatches \
            -d '{"ref":"production"}'
          echo "Redeploy workflow dispatched on production branch."

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3 — Terraform Destroy  (workflow_dispatch with action=destroy)
  # ─────────────────────────────────────────────────────────────────────────────
  terraform-destroy:
    name: "Terraform Destroy"
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'destroy'
    environment:
      name: production
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Ensure S3 backend bucket and DynamoDB table exist
        run: |
          aws s3api head-bucket --bucket "${{ env.TF_STATE_BUCKET }}" 2>/dev/null ||
            aws s3 mb "s3://${{ env.TF_STATE_BUCKET }}" --region "${{ env.AWS_REGION }}"
          aws dynamodb describe-table --table-name "${{ env.TF_LOCK_TABLE }}" 2>/dev/null ||
            aws dynamodb create-table \
              --table-name "${{ env.TF_LOCK_TABLE }}" \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --billing-mode PAY_PER_REQUEST

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Destroy
        run: |
          terraform destroy \
            -auto-approve \
            -var="key_pair_name=${{ secrets.AWS_KEY_PAIR_NAME }}" \
            -var="project_name=event-ticketing" \
            -var="environment=production" \
            -var="mongo_username=appuser" \
            -var="mongo_password=${{ secrets.MONGO_PASSWORD }}" \
            -var="mongo_database=event_ticketing" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}"

      - name: Destroy summary
        run: echo "## 🗑️ Infrastructure destroyed" >> $GITHUB_STEP_SUMMARY
